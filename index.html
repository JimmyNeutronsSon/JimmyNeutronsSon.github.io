<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aether — Your Gateway to Freedom</title>
  <meta name="description"
    content="Aether is dedicated to giving you the best experience at school. Surf the web freely and play games without restrictions.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <!-- ═══════════════════════════════════════════════ -->
  <!-- HERO SECTION                                    -->
  <!-- ═══════════════════════════════════════════════ -->
  <section class="hero" id="hero">
    <!-- Local Video Background -->
    <div class="hero-bg" id="video-container">
      <video id="yt-bg"
        src="Flying above the clouds, 1 hour, no looping or cuts, no sound - Cloud 9 (1080p, h264).mp4"
        autoplay loop muted playsinline></video>
    </div>

    <div class="hero-content">
      <div class="hero-badge" id="hero-badge">
        <span class="badge-dot"></span>
        Introducing Aether
      </div>

      <h1 class="hero-heading" id="hero-heading">
        Aether.
      </h1>

      <p class="hero-sub landing-phrases" id="hero-sub" style="transition: opacity 0.5s ease; min-height: 2em;">
        Aether f*cks iboss
      </p>

      <div class="hero-ctas" id="hero-ctas">
        <a href="browse.html" class="btn btn-primary" id="btn-surf">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="7" y1="17" x2="17" y2="7" />
            <polyline points="7 7 17 7 17 17" />
          </svg>
          Surf the Web
        </a>
        <a href="games.html" class="btn btn-outline" id="btn-games">Play Games</a>
      </div>
    </div>

    <!-- Scroll indicator -->
    <div class="scroll-indicator" id="scroll-indicator">
      <div class="scroll-line"></div>
    </div>
  </section>



  <!-- Footer -->
  <footer id="footer">
    <div class="footer-inner">
      <span class="footer-logo">Aether<span class="logo-dot">.</span></span>
      <span class="footer-copy">&copy; 2026 Aether. All rights reserved.</span>
    </div>
  </footer>

  <script src="main.js"></script>
  <script src="sidebar.js"></script>
</body>

</html>
